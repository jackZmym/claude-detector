version: '3.8'

services:
  claude-detector:
    build: .
    container_name: claude-detector
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    # 安全：限制资源
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # 安全：只读文件系统 + 临时写入
    read_only: true
    tmpfs:
      - /tmp
    # 安全：禁止提权
    security_opt:
      - no-new-privileges:true
